<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container my-5">

        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1>Contact Us</h1>
                <form>
                    <label class="form-label" for="name">Name:</label>
                    <input type="text" id="name" class="form-control">
                    <label class="form-label" for="email">Email:</label>
                    <input type="email" id="email" class="form-control" required />
                    <label class="form-label" for="message">Message:</label>
                    <textarea id="message" class="form-control" required></textarea>
                    <button type="submit" class="btn btn-primary mt-3"
                        onClick="alert('Thank you! We will get back to you shortly.')">Submit</button>
                </form>
            </div>
        </div>
    </main>
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6 text-center text-md-start">
                    <h5>Digital Agency</h5>
                    <p class="small text-secondary">We create digital solutions for the future.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <p class="mb-0">&copy; 2026 Digital Agency</p>
                    <p class="small text-secondary">Created by Johanna & Yuki.</p>
                </div>
            </div>
        </div>
    </footer>

</body>

</html>
